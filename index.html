<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css selectors</title>
    <link rel="stylesheet" href="style.css">
    <!-- <link rel="icon" type="image/x-icon" href="favicon.ico"> -->
</head>
<body>
    <main>
        <section>
            <h1 class="head">First Heading</h1>
            <h2 class="head" id="bglime">Second Heading</h2>
            <h3 class="head">Third Heading</h3>
        </section>
        <section>
            <p>First paragraph</p>
            <p id="para">second paragraph</p>
            <p>third <font color="black" size="5">paragraph</font></p>
        </section>
        <section>
            <b>Two lists:</b>
            <br>
            <hr>
            <ul>
                <li>Click <a href="https://www.google.com"><mark>here</mark></a> to go to google</li>
                <li>Click <a href="https://www.github.com"><font color="black">here</font></a> to go to github</li>
            </ul>
            <br>
            <hr>
            <br>
            <ol>
                <li>First item</li>
                <li><font color="blue">Second item in blue</font></li>
                <li><font color="red">Third item in red</font></li>
                <li>Fourth item</li>
                <li>Fifth item</li>
            </ol >
        </section>
        
    </main>
</body>
</html>
